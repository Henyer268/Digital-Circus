<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MiRed — Inicio</title>
  <style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
body.auth-page {
  background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
}
.auth-container {
  background: white; border-radius: 16px; padding: 40px;
  width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.auth-logo { text-align: center; margin-bottom: 28px; }
.auth-logo h1 { font-size: 2.2rem; color: #0f3460; }
.auth-logo p { color: #888; font-size: 0.95rem; margin-top: 4px; }
.auth-tabs { display: flex; margin-bottom: 24px; border-radius: 8px; overflow: hidden; border: 1px solid #ddd; }
.tab-btn { flex: 1; padding: 12px; border: none; background: #f5f5f5; cursor: pointer; font-size: 0.95rem; transition: all 0.2s; }
.tab-btn.active { background: #0f3460; color: white; font-weight: 600; }
.auth-form { display: flex; flex-direction: column; gap: 14px; }
.auth-form input { padding: 13px 16px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.95rem; outline: none; }
.auth-form input:focus { border-color: #0f3460; }
.btn-primary { padding: 13px; background: #0f3460; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 4px; }
.btn-primary:hover { background: #e94560; }
.auth-message { margin-top: 16px; text-align: center; font-size: 0.9rem; min-height: 20px; }
.auth-message.error { color: #e94560; }
.auth-message.success { color: #27ae60; }
.hidden { display: none; }
</style>
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-logo">
      <h1>🌐 MiRed</h1>
      <p>La red social de tu grupo</p>
    </div>

    <div class="auth-tabs">
      <button class="tab-btn active" onclick="showTab('login')">Iniciar sesión</button>
      <button class="tab-btn" onclick="showTab('register')">Registrarse</button>
    </div>

    <div id="login" class="auth-form">
      <input type="email" id="login-email" placeholder="Correo electrónico" />
      <input type="password" id="login-password" placeholder="Contraseña" />
      <button class="btn-primary" onclick="login()">Entrar</button>
    </div>

    <div id="register" class="auth-form hidden">
      <input type="text" id="reg-name" placeholder="Tu nombre completo" />
      <input type="email" id="reg-email" placeholder="Correo electrónico" />
      <input type="password" id="reg-password" placeholder="Contraseña (mín. 6 caracteres)" />
      <button class="btn-primary" onclick="register()">Crear cuenta</button>
    </div>

    <div id="auth-message" class="auth-message"></div>
  </div>
