<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MiRed — Mi Perfil</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #f0f2f5; }

    /* NAVBAR */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; height: 56px;
      background: #0f3460; display: flex; align-items: center;
      justify-content: space-between; padding: 0 20px; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .navbar-logo { color: white; font-size: 1.4rem; font-weight: 700; cursor: pointer; }
    .navbar-right { display: flex; align-items: center; gap: 12px; }
    .navbar-user { color: white; font-size: 0.9rem; }
    .btn-logout { background: #e94560; color: white; border: none; padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
    .btn-logout:hover { background: #c73652; }

    /* LAYOUT */
    .page { padding-top: 56px; }

    /* PORTADA */
    .cover-section { position: relative; }
    .cover-img {
      width: 100%; height: 260px; object-fit: cover; background: linear-gradient(135deg, #0f3460, #e94560);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .cover-img img { width: 100%; height: 100%; object-fit: cover; }
    .cover-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.15);
      display: flex; align-items: flex-end; justify-content: flex-end;
      padding: 16px;
    }
    .btn-edit-cover {
      background: rgba(255,255,255,0.85); border: none; border-radius: 8px;
      padding: 8px 14px; cursor: pointer; font-size: 0.85rem; font-weight: 600;
      display: flex; align-items: center; gap: 6px; backdrop-filter: blur(4px);
    }
    .btn-edit-cover:hover { background: white; }

    /* PERFIL INFO */
    .profile-info-section {
      max-width: 860px; margin: 0 auto; padding: 0 16px;
    }
    .profile-top {
      display: flex; align-items: flex-end; gap: 16px;
      margin-top: -50px; margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .profile-avatar-wrap { position: relative; flex-shrink: 0; }
    .profile-avatar {
      width: 130px; height: 130px; border-radius: 50%;
      border: 4px solid white; background: #0f3460; color: white;
      font-size: 3rem; font-weight: 700; display: flex;
      align-items: center; justify-content: center;
      overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .btn-edit-avatar {
      position: absolute; bottom: 6px; right: 6px;
      width: 32px; height: 32px; border-radius: 50%;
      background: #0f3460; color: white; border: 2px solid white;
      cursor: pointer; font-size: 0.9rem; display: flex;
      align-items: center; justify-content: center;
    }
    .btn-edit-avatar:hover { background: #e94560; }
    .profile-details { flex: 1; padding-bottom: 8px; min-width: 200px; }
    .profile-name-big { font-size: 1.6rem; font-weight: 800; color: #1a1a2e; }
    .profile-bio { color: #555; font-size: 0.95rem; margin-top: 4px; }
    .profile-stats { display: flex; gap: 20px; margin-top: 10px; }
    .stat-item { text-align: center; }
    .stat-num { font-weight: 800; font-size: 1.1rem; color: #1a1a2e; }
    .stat-label { font-size: 0.78rem; color: #888; }
    .profile-actions { display: flex; gap: 10px; margin-left: auto; padding-bottom: 8px; }
    .btn-edit-profile {
      background: #0f3460; color: white; border: none;
      padding: 10px 20px; border-radius: 8px; cursor: pointer;
      font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 6px;
    }
    .btn-edit-profile:hover { background: #e94560; }

    /* TABS */
    .profile-tabs {
      max-width: 860px; margin: 0 auto 20px; padding: 0 16px;
      display: flex; border-bottom: 2px solid #ddd; gap: 0;
    }
    .tab-item {
      padding: 12px 20px; cursor: pointer; font-weight: 600;
      color: #888; border-bottom: 3px solid transparent; margin-bottom: -2px;
      transition: all 0.2s; font-size: 0.95rem;
    }
    .tab-item:hover { color: #0f3460; background: #f5f5f5; }
    .tab-item.active { color: #0f3460; border-bottom-color: #0f3460; }

    /* CONTENT */
    .profile-content {
      max-width: 860px; margin: 0 auto; padding: 0 16px 40px;
      display: grid; grid-template-columns: 300px 1fr; gap: 20px;
    }
    .sidebar-col { display: flex; flex-direction: column; gap: 16px; }
    .card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .card-title { font-weight: 700; font-size: 1rem; margin-bottom: 12px; color: #1a1a2e; }
    .info-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; color: #444; font-size: 0.9rem; border-bottom: 1px solid #f5f5f5; }
    .info-item:last-child { border-bottom: none; }
    .info-icon { font-size: 1.1rem; width: 24px; text-align: center; }

    /* POSTS */
    .post { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 16px; }
    .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .post-avatar { width: 42px; height: 42px; border-radius: 50%; background: #0f3460; color: white; font-weight: 700; display: flex; align-items: center; justify-content: center; font-size: 1rem; overflow: hidden; flex-shrink: 0; }
    .post-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .post-author { font-weight: 700; font-size: 0.95rem; }
    .post-time { font-size: 0.78rem; color: #888; }
    .post-content { font-size: 0.95rem; line-height: 1.5; color: #1a1a2e; margin-bottom: 12px; }
    .post-stats { display: flex; gap: 16px; font-size: 0.82rem; color: #888; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #f0f2f5; }
    .post-actions { display: flex; gap: 8px; }
    .post-btn { flex: 1; padding: 8px; border: none; background: none; border-radius: 8px; cursor: pointer; font-size: 0.88rem; color: #555; display: flex; align-items: center; justify-content: center; gap: 5px; transition: background 0.2s; }
    .post-btn:hover { background: #f0f2f5; }
    .post-btn.liked { color: #e94560; font-weight: 600; }
    .post-btn.delete-btn { color: #e94560; }
    .post-btn.delete-btn:hover { background: #fff0f3; }
    .empty-posts { text-align: center; color: #888; padding: 40px; background: white; border-radius: 12px; }

    /* MODAL EDITAR PERFIL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 300; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: white; border-radius: 16px; padding: 28px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-size: 1.15rem; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #888; }
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 0.88rem; font-weight: 600; color: #444; margin-bottom: 6px; display: block; }
    .form-input {
      width: 100%; padding: 11px 14px; border: 1.5px solid #ddd;
      border-radius: 8px; font-size: 0.95rem; outline: none; font-family: inherit;
    }
    .form-input:focus { border-color: #0f3460; }
    .form-textarea { resize: none; min-height: 80px; }
    .form-hint { font-size: 0.78rem; color: #aaa; margin-top: 4px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    .btn-cancel { padding: 10px 20px; border: none; background: #f0f2f5; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
    .btn-save { padding: 10px 20px; border: none; background: #0f3460; color: white; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
    .btn-save:hover { background: #e94560; }

    /* AVATAR PREVIEW */
    .avatar-preview-wrap { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; }
    .avatar-preview { width: 72px; height: 72px; border-radius: 50%; background: #0f3460; color: white; font-size: 1.6rem; font-weight: 700; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 3px solid #eee; }
    .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #1a1a2e; color: white; padding: 12px 24px; border-radius: 30px;
      font-size: 0.9rem; font-weight: 600; z-index: 999;
      transition: transform 0.3s ease; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: #27ae60; }
    .toast.error { background: #e94560; }

    /* LOADING */
    .loader { text-align: center; padding: 40px; color: #888; }

    /* COVER PLACEHOLDER */
    .cover-placeholder {
      width: 100%; height: 260px;
      background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 50%, #e94560 100%);
      position: relative; overflow: hidden;
    }
    .cover-placeholder::after {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 20px);
    }

    @media (max-width: 768px) {
  .profile-content { grid-template-columns: 1fr; }
  .profile-top { flex-direction: column; align-items: center; text-align: center; margin-top: -60px; }
  .profile-stats { justify-content: center; }
  .profile-actions { margin: 0 auto; }
  .sidebar-col { display: none; }
  .page { padding-bottom: 80px; }
  .cover-img { height: 180px !important; }
  .profile-avatar { width: 90px !important; height: 90px !important; font-size: 2rem !important; }
}
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-logo" onclick="window.location.href='feed.html'">🌐 MiRed</div>
    <div class="navbar-right">
      <span class="navbar-user" id="navbar-name">Cargando...</span>
      <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
  </nav>

  <div class="page">

    <!-- PORTADA -->
    <div class="cover-section">
      <div class="cover-placeholder" id="cover-container">
        <img id="cover-img" src="" alt="Portada" style="width:100%;height:100%;object-fit:cover;display:none;" />
      </div>
      <div class="cover-overlay">
        <button class="btn-edit-cover" onclick="document.getElementById('cover-input').click()">
          📷 Cambiar portada
        </button>
        <input type="file" id="cover-input" accept="image/*" style="display:none" onchange="uploadCover(this)" />
      </div>
    </div>

    <!-- PERFIL TOP -->
    <div class="profile-info-section">
      <div class="profile-top">
        <div class="profile-avatar-wrap">
          <div class="profile-avatar" id="main-avatar">?</div>
          <button class="btn-edit-avatar" onclick="document.getElementById('avatar-input').click()" title="Cambiar foto">📷</button>
          <input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="uploadAvatar(this)" />
        </div>
        <div class="profile-details">
          <div class="profile-name-big" id="profile-name-big">Cargando...</div>
          <div class="profile-bio" id="profile-bio-display">Sin biografía</div>
          <div class="profile-stats">
            <div class="stat-item">
              <div class="stat-num" id="stat-posts">0</div>
              <div class="stat-label">Publicaciones</div>
            </div>
            <div class="stat-item">
              <div class="stat-num" id="stat-likes">0</div>
              <div class="stat-label">Me gustas recibidos</div>
            </div>
          </div>
        </div>
        <div class="profile-actions">
          <button class="btn-edit-profile" onclick="openEditModal()">✏️ Editar perfil</button>
        </div>
      </div>
    </div>

    <!-- TABS -->
    <div class="profile-tabs">
      <div class="tab-item active" onclick="switchTab('posts', this)">📝 Publicaciones</div>
      <div class="tab-item" onclick="switchTab('info', this)">ℹ️ Información</div>
    </div>

    <!-- CONTENIDO -->
    <div class="profile-content">
      <!-- SIDEBAR INFO -->
      <div class="sidebar-col">
        <div class="card" id="info-card">
          <div class="card-title">Información</div>
          <div class="info-item">
            <span class="info-icon">👤</span>
            <span id="info-name">—</span>
          </div>
          <div class="info-item">
            <span class="info-icon">✉️</span>
            <span id="info-email">—</span>
          </div>
          <div class="info-item">
            <span class="info-icon">📍</span>
            <span id="info-location">Sin ubicación</span>
          </div>
          <div class="info-item">
            <span class="info-icon">🎂</span>
            <span id="info-birthdate">Sin fecha</span>
          </div>
          <div class="info-item">
            <span class="info-icon">📅</span>
            <span id="info-joined">—</span>
          </div>
        </div>
      </div>

      <!-- POSTS COL -->
      <div id="posts-col">
        <div class="loader">Cargando publicaciones...</div>
      </div>
    </div>

  </div>

  <!-- MODAL EDITAR PERFIL -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Editar perfil</span>
        <button class="modal-close" onclick="closeEditModal()">✕</button>
      </div>

      <div class="form-group">
        <label class="form-label">Foto de perfil</label>
        <div class="avatar-preview-wrap">
          <div class="avatar-preview" id="modal-avatar-preview">?</div>
          <button type="button" style="padding:8px 14px;background:#f0f2f5;border:none;border-radius:8px;cursor:pointer;font-size:0.85rem;" onclick="document.getElementById('avatar-input').click()">
            📷 Cambiar foto
          </button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Nombre completo</label>
        <input type="text" class="form-input" id="edit-name" placeholder="Tu nombre" />
      </div>

      <div class="form-group">
        <label class="form-label">Biografía</label>
        <textarea class="form-input form-textarea" id="edit-bio" placeholder="Cuéntanos algo sobre ti..."></textarea>
        <div class="form-hint">Máximo 150 caracteres</div>
      </div>

      <div class="form-group">
        <label class="form-label">📍 Ubicación</label>
        <input type="text" class="form-input" id="edit-location" placeholder="Ciudad, País" />
      </div>

      <div class="form-group">
        <label class="form-label">🎂 Fecha de nacimiento</label>
        <input type="date" class="form-input" id="edit-birthdate" />
      </div>

      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeEditModal()">Cancelar</button>
        <button class="btn-save" onclick="saveProfile()">Guardar cambios</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const _supabase = window.supabase.createClient(
      'https://xdhvztdhjotzjwwrwijx.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkaHZ6dGRoam90emp3d3J3aWp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1OTU3NjQsImV4cCI6MjA5MzE3MTc2NH0.QkHBsglfL6g6WcXXORDGHX26MUzAhFERX0_9M9cGpQI'
    )

    let currentUser = null
    let currentProfile = null

    // ─── INIT ──────────────────────────────────────────────
    async function init() {
      const { data: { session } } = await _supabase.auth.getSession()
      if (!session) return window.location.href = 'index.html'
      currentUser = session.user

      const { data: profile } = await _supabase
        .from('profiles').select('*').eq('id', currentUser.id).single()

      currentProfile = profile
      renderProfile(profile)
      loadMyPosts()
    }

    function renderProfile(profile) {
      const name = profile?.full_name || currentUser.email
      const initial = name.charAt(0).toUpperCase()

      // Navbar
      document.getElementById('navbar-name').textContent = name

      // Avatar principal
      const mainAvatar = document.getElementById('main-avatar')
      if (profile?.avatar_url) {
        mainAvatar.innerHTML = `<img src="${profile.avatar_url}" alt="avatar" />`
      } else {
        mainAvatar.textContent = initial
      }

      // Portada
      if (profile?.cover_url) {
        const img = document.getElementById('cover-img')
        img.src = profile.cover_url
        img.style.display = 'block'
      }

      // Info principal
      document.getElementById('profile-name-big').textContent = name
      document.getElementById('profile-bio-display').textContent = profile?.bio || 'Sin biografía'

      // Sidebar info
      document.getElementById('info-name').textContent = name
      document.getElementById('info-email').textContent = currentUser.email
      document.getElementById('info-location').textContent = profile?.location || 'Sin ubicación'
      document.getElementById('info-birthdate').textContent = profile?.birthdate
        ? new Date(profile.birthdate).toLocaleDateString('es-CO', { day: 'numeric', month: 'long', year: 'numeric' })
        : 'Sin fecha de nacimiento'
      document.getElementById('info-joined').textContent = 'Miembro desde ' + new Date(currentUser.created_at).toLocaleDateString('es-CO', { month: 'long', year: 'numeric' })

      // Modal preview avatar
      const modalPreview = document.getElementById('modal-avatar-preview')
      if (profile?.avatar_url) {
        modalPreview.innerHTML = `<img src="${profile.avatar_url}" alt="avatar" />`
      } else {
        modalPreview.textContent = initial
      }

      // Cargar modal fields
      document.getElementById('edit-name').value = profile?.full_name || ''
      document.getElementById('edit-bio').value = profile?.bio || ''
      document.getElementById('edit-location').value = profile?.location || ''
      document.getElementById('edit-birthdate').value = profile?.birthdate || ''
    }

    // ─── CARGAR MIS POSTS ──────────────────────────────────
    async function loadMyPosts() {
      const { data: posts } = await _supabase
        .from('posts').select('*')
        .eq('user_id', currentUser.id)
        .order('created_at', { ascending: false })

      const { data: allLikes } = await _supabase.from('likes').select('*').eq('post_id', posts?.map(p => p.id) || [])

      // Calcular stats
      let totalLikes = 0
      posts?.forEach(post => {
        totalLikes += allLikes?.filter(l => l.post_id === post.id).length || 0
      })
      document.getElementById('stat-posts').textContent = posts?.length || 0
      document.getElementById('stat-likes').textContent = totalLikes

      const col = document.getElementById('posts-col')

      if (!posts || posts.length === 0) {
        col.innerHTML = '<div class="empty-posts">No tienes publicaciones aún.<br>¡Ve al <a href="feed.html" style="color:#0f3460">feed</a> y crea tu primera!</div>'
        return
      }

      const name = currentProfile?.full_name || currentUser.email
      const initial = name.charAt(0).toUpperCase()
      const avatarHTML = currentProfile?.avatar_url
        ? `<img src="${currentProfile.avatar_url}" alt="avatar" />`
        : initial

      col.innerHTML = posts.map(post => {
        const postLikes = allLikes?.filter(l => l.post_id === post.id) || []
        const userLiked = postLikes.some(l => l.user_id === currentUser.id)
        const time = new Date(post.created_at).toLocaleDateString('es-CO', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })
        return `
          <div class="post" id="post-${post.id}">
            <div class="post-header">
              <div class="post-avatar">${avatarHTML}</div>
              <div style="flex:1">
                <div class="post-author">${name}</div>
                <div class="post-time">${time}</div>
              </div>
              <button class="post-btn delete-btn" style="flex:0;padding:6px 10px;" onclick="deletePost('${post.id}')" title="Eliminar">🗑️</button>
            </div>
            <div class="post-content">${post.content}</div>
            <div class="post-stats">
              <span id="like-count-${post.id}">${postLikes.length} Me gusta</span>
            </div>
            <div class="post-actions">
              <button class="post-btn ${userLiked ? 'liked' : ''}" id="like-btn-${post.id}" onclick="toggleLike('${post.id}')">
                ❤️ Me gusta
              </button>
              <button class="post-btn delete-btn" onclick="deletePost('${post.id}')">🗑️ Eliminar</button>
            </div>
          </div>`
      }).join('')
    }

    // ─── LIKE ──────────────────────────────────────────────
    async function toggleLike(postId) {
      const { data: existing } = await _supabase
        .from('likes').select('*').eq('user_id', currentUser.id).eq('post_id', postId).single()
      if (existing) {
        await _supabase.from('likes').delete().eq('user_id', currentUser.id).eq('post_id', postId)
        document.getElementById(`like-btn-${postId}`)?.classList.remove('liked')
      } else {
        await _supabase.from('likes').insert({ user_id: currentUser.id, post_id: postId })
        document.getElementById(`like-btn-${postId}`)?.classList.add('liked')
      }
      const { data: likes } = await _supabase.from('likes').select('*').eq('post_id', postId)
      document.getElementById(`like-count-${postId}`).textContent = `${likes.length} Me gusta`
    }

    // ─── ELIMINAR POST ─────────────────────────────────────
    async function deletePost(postId) {
      if (!confirm('¿Eliminar esta publicación?')) return
      await _supabase.from('likes').delete().eq('post_id', postId)
      await _supabase.from('comments').delete().eq('post_id', postId)
      await _supabase.from('posts').delete().eq('id', postId)
      document.getElementById(`post-${postId}`)?.remove()
      showToast('Publicación eliminada', 'success')
      // Actualizar contador
      const current = parseInt(document.getElementById('stat-posts').textContent) || 0
      document.getElementById('stat-posts').textContent = Math.max(0, current - 1)
    }

    // ─── UPLOAD AVATAR ─────────────────────────────────────
    async function uploadAvatar(input) {
      const file = input.files[0]
      if (!file) return
      if (file.size > 2 * 1024 * 1024) { showToast('Imagen muy grande (máx 2MB)', 'error'); return }

      showToast('Subiendo foto...')
      const ext = file.name.split('.').pop()
      const path = `avatars/${currentUser.id}.${ext}`

      const { error: upErr } = await _supabase.storage.from('avatars').upload(path, file, { upsert: true })
      if (upErr) { showToast('Error subiendo imagen', 'error'); return }

      const { data: urlData } = _supabase.storage.from('avatars').getPublicUrl(path)
      const avatarUrl = urlData.publicUrl + '?t=' + Date.now()

      await _supabase.from('profiles').update({ avatar_url: avatarUrl }).eq('id', currentUser.id)
      currentProfile = { ...currentProfile, avatar_url: avatarUrl }

      // Actualizar UI
      document.getElementById('main-avatar').innerHTML = `<img src="${avatarUrl}" alt="avatar" />`
      document.getElementById('modal-avatar-preview').innerHTML = `<img src="${avatarUrl}" alt="avatar" />`
      showToast('¡Foto actualizada!', 'success')
    }

    // ─── UPLOAD COVER ──────────────────────────────────────
    async function uploadCover(input) {
      const file = input.files[0]
      if (!file) return
      if (file.size > 5 * 1024 * 1024) { showToast('Imagen muy grande (máx 5MB)', 'error'); return }

      showToast('Subiendo portada...')
      const ext = file.name.split('.').pop()
      const path = `covers/${currentUser.id}.${ext}`

      const { error: upErr } = await _supabase.storage.from('avatars').upload(path, file, { upsert: true })
      if (upErr) { showToast('Error subiendo portada', 'error'); return }

      const { data: urlData } = _supabase.storage.from('avatars').getPublicUrl(path)
      const coverUrl = urlData.publicUrl + '?t=' + Date.now()

      await _supabase.from('profiles').update({ cover_url: coverUrl }).eq('id', currentUser.id)
      currentProfile = { ...currentProfile, cover_url: coverUrl }

      const img = document.getElementById('cover-img')
      img.src = coverUrl
      img.style.display = 'block'
      showToast('¡Portada actualizada!', 'success')
    }

    // ─── EDIT MODAL ────────────────────────────────────────
    function openEditModal() {
      document.getElementById('edit-modal').classList.add('active')
    }
    function closeEditModal() {
      document.getElementById('edit-modal').classList.remove('active')
    }

    async function saveProfile() {
      const name = document.getElementById('edit-name').value.trim()
      const bio = document.getElementById('edit-bio').value.trim().slice(0, 150)
      const location = document.getElementById('edit-location').value.trim()
      const birthdate = document.getElementById('edit-birthdate').value

      if (!name) { showToast('El nombre no puede estar vacío', 'error'); return }

      const { error } = await _supabase.from('profiles').update({
        full_name: name, bio, location, birthdate: birthdate || null
      }).eq('id', currentUser.id)

      if (error) { showToast('Error guardando', 'error'); return }

      currentProfile = { ...currentProfile, full_name: name, bio, location, birthdate }
      renderProfile(currentProfile)
      closeEditModal()
      showToast('¡Perfil actualizado!', 'success')
    }

    // ─── TAB ───────────────────────────────────────────────
    function switchTab(tab, el) {
      document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'))
      el.classList.add('active')
      // Por ahora solo hay tab de posts (se puede expandir)
    }

    // ─── TOAST ─────────────────────────────────────────────
    let toastTimer = null
    function showToast(msg, type = '') {
      const t = document.getElementById('toast')
      t.textContent = msg
      t.className = 'toast ' + type
      void t.offsetWidth
      t.classList.add('show')
      clearTimeout(toastTimer)
      toastTimer = setTimeout(() => t.classList.remove('show'), 2800)
    }

    // ─── LOGOUT ────────────────────────────────────────────
    async function logout() {
      await _supabase.auth.signOut()
      window.location.href = 'index.html'
    }

    init()
  </script>
